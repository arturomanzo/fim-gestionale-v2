<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=app/index.html">
    <title>FIM Gestionale v2 - Caricamento...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #F0F4F8; }
        .loader { text-align: center; }
        .loader h2 { color: #1A3A5C; margin-bottom: 8px; }
        .loader p { color: #64748B; }
        .spinner { width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top-color: #1A3A5C; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>FIM Insurance Broker</h2>
        <p>Caricamento gestionale...</p>
    </div>
    <script>window.location.replace('app/index.html');</script>
</body>
</html>
